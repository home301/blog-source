# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the action will run. 
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2

      - name: prepare env
        run: pip install mkdocs
       
      - name: move 
        run: cd $GITHUB_WORKSPACE
        
      - name: check
        run: pwd
         
      - name: test
        run: |
          ls
          mkdocs build
          ls
          
      - name: delpoy
        run: |
          cd ..
          git clone "https://github.com/Maznna/blog.git"
          ls
          cp -rf ./blog-source/site ./blog
          cd blog
          pwd
          git remote add blog "https://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@github.com/Maznna/blog.git"
          echo "here"
          git commit -m "auto commit by action"
          echo "here after commit"
          git config user.name "github deploy action"
          git config user.email "a@b.com"
          echo "here before push"
          git push blog --force

